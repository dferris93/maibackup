# Example config with a failing backup command.
BACKUP_CMD=(false)
SLEEPTIME=1
LOGDIR="./logs"
LOGFILE="$LOGDIR/failure.log"

pre_backup_command() {
    echo "pre backup command test"
    return 0
}

post_backup_command() {
    echo "post backup command test"
    return 1
}

failed_backup_command() {
    echo "failed backup command test"
    return 0
}

successful_backup_command() {
    echo "successful backup command test"
    return 0
}
